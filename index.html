<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chinese Name Generator</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;

            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
                        url("https://images.unsplash.com/photo-1522383225653-ed111181a951");
            background-size: cover;
            background-position: center;
        }

        /* 🌸 Header */
        .header {
            margin-top: 40px;
            text-align: center;
            color: #4a2c2a;
            animation: fadeIn 1s ease;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
        }

        .header p {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.8;
        }

        .card {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 1.2s ease;
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 26px;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #e89cae;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #d97b90;
            transform: scale(1.05);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 25px;
            text-align: left;
            font-size: 14px;
            color: #333;
            white-space: pre-wrap;
            line-height: 1.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🌸 Floating petals */
        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: pink;
            border-radius: 50%;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0);
            }
            100% {
                transform: translateY(110vh) translateX(50px);
            }
        }
    </style>
</head>
<body>

    <!-- 🌸 Floating petals -->
    <script>
        for (let i = 0; i < 20; i++) {
            let petal = document.createElement("div");
            petal.classList.add("petal");
            petal.style.left = Math.random() * 100 + "vw";
            petal.style.animationDuration = (5 + Math.random() * 5) + "s";
            document.body.appendChild(petal);
        }
    </script>

    <!-- 🌸 Header -->
    <div class="header">
        <h2>Chinese Learning Through Cultural Practices and Community Engagement: 82319B</h2>
        <p>by Ashna Jain, Kamya Singh, and Samridhhi Bhardwaj</p>
    </div>

    <!-- 🌸 Main Card -->
    <div class="card">
        <h1>Chinese Name Generator 🌸</h1>

        <input id="nameInput" placeholder="Enter your name" />
        <br>
        <button onclick="generate()" id="generateBtn">Generate</button>

        <div id="result"></div>
    </div>

    <script>
        async function generate() {
            const name = document.getElementById("nameInput").value;
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("generateBtn");

            if (!name) {
                alert("Please enter a name first!");
                return;
            }

            btn.innerText = "Generating...";
            btn.disabled = true;
            resultDiv.innerHTML = "✨ Loading your Chinese name...";

            try {
                const response = await fetch("https://chinese-culture-project-chinese-names.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });

                if (!response.ok) throw new Error("Server error");

                const data = await response.json();
                resultDiv.innerHTML = data.result;

            } catch (error) {
                resultDiv.innerHTML = "Sorry, something went wrong. Please try again.";
            } finally {
                btn.innerText = "Generate";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
