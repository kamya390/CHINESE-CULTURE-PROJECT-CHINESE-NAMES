<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Name Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            padding: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 70%;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: left;
            white-space: pre-wrap; /* Keeps the line breaks from OpenAI */
            display: none; /* Hidden until a result is generated */
        }
    </style>
</head>
<body>

    <h1>Chinese Name Generator</h1>
    <p>Enter your name below to get a custom Chinese name based on its sound and meaning.</p>

    <input type="text" id="nameInput" placeholder="Enter your name (e.g., John)">
    <br>
    <button onclick="generate()" id="generateBtn">Generate Name</button>

    <div id="result"></div>

    <script>
        async function generate() {
            const nameInput = document.getElementById("nameInput").value;
            const resultDiv = document.getElementById("result");
            const generateBtn = document.getElementById("generateBtn");

            if (!nameInput) {
                alert("Please enter a name first!");
                return;
            }

            // Update UI while loading
            generateBtn.innerText = "Generating...";
            generateBtn.disabled = true;
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "Loading your custom name...";

            try {
                // 1. Fetch specifically from your Render /generate endpoint
                const response = await fetch("https://chinese-culture-project-chinese-names.onrender.com/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    // 2. Send only the variables your Flask app is looking for
                    body: JSON.stringify({
                        name: nameInput
                    })
                });

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                // 3. Extract the response from your Flask server
                const data = await response.json();
                
                // 4. Display the result
                resultDiv.innerHTML = data.result;

            } catch (error) {
                console.error("Error:", error);
                resultDiv.innerHTML = "Sorry, there was an error generating your name. Please check your backend server.";
            } finally {
                // Reset the button
                generateBtn.innerText = "Generate Name";
                generateBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
